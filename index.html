<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farrukh Sabriy - Unhappiness & Failure Expert</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff006e;
            --secondary-color: #8338ec;
            --accent-color: #00f5ff;
            --dark-bg: #0a0a0a;
            --dark-card: #1a1a1a;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --gradient-1: linear-gradient(135deg, #ff006e 0%, #8338ec 50%, #00f5ff 100%);
            --gradient-2: linear-gradient(45deg, #0a0a0a 0%, #1a1a1a 50%, #0a0a0a 100%);
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--dark-bg);
            color: var(--text-light);
            overflow-x: hidden;
            cursor: none;
        }

        /* Custom Cursor */
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.1s ease;
        }

        .cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            pointer-events: none;
            z-index: 9998;
            transition: all 0.3s ease;
        }

        /* Parallax Container */
        .parallax-container {
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, #1a1a1a 0%, #0a0a0a 70%);
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255,0,110,0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(131,56,236,0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(0,245,255,0.1) 0%, transparent 50%);
            animation: heroFloat 20s ease-in-out infinite;
        }

        @keyframes heroFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(1deg); }
            66% { transform: translateY(10px) rotate(-1deg); }
        }

        .hero-content {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .hero-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(3rem, 8vw, 8rem);
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 30px rgba(255,0,110,0.5));
            animation: titleGlitch 3s ease-in-out infinite;
        }

        @keyframes titleGlitch {
            0%, 100% { transform: translate(0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-1px, 1px); }
        }

        .hero-subtitle {
            font-size: clamp(1.2rem, 3vw, 2rem);
            color: var(--text-muted);
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeInUp 1.5s ease forwards 0.5s;
        }

        .hero-expertise {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .expertise-tag {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.5rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.2);
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards;
        }

        .expertise-tag:nth-child(1) { animation-delay: 1s; }
        .expertise-tag:nth-child(2) { animation-delay: 1.2s; }
        .expertise-tag:nth-child(3) { animation-delay: 1.4s; }
        .expertise-tag:nth-child(4) { animation-delay: 1.6s; }

        .cta-button {
            background: var(--gradient-1);
            color: white;
            padding: 1.2rem 3rem;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: none;
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease forwards 1.8s;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .cta-button:hover::before {
            left: 100%;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Parallax Layers */
        .parallax-layer {
            position: absolute;
            width: 100%;
            height: 100vh;
            will-change: transform;
        }

        .layer-1 { z-index: 1; }
        .layer-2 { z-index: 2; }
        .layer-3 { z-index: 3; }

        .floating-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.6;
            animation: float 25s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
        }

        /* About Section */
        .about {
            min-height: 100vh;
            padding: 10rem 2rem 5rem;
            position: relative;
            background: var(--gradient-2);
        }

        .section-title {
            font-family: 'Orbitron', monospace;
            font-size: clamp(2.5rem, 6vw, 5rem);
            text-align: center;
            margin-bottom: 4rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(50px);
        }

        .about-content {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .about-text {
            opacity: 0;
            transform: translateX(-50px);
        }

        .about-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(50px);
        }

        .stat-card:hover {
            transform: translateY(-10px);
            background: rgba(255,0,110,0.1);
            border-color: var(--primary-color);
            box-shadow: 0 20px 40px rgba(255,0,110,0.3);
        }

        .stat-number {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        /* Experience Timeline */
        .timeline {
            margin: 4rem 0;
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--primary-color), var(--accent-color));
            transform: translateX(-50%);
        }

        .timeline-item {
            position: relative;
            margin: 3rem 0;
            opacity: 0;
            transform: translateX(-100px);
        }

        .timeline-item:nth-child(even) {
            transform: translateX(100px);
        }

        .timeline-content {
            width: 45%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .timeline-item:nth-child(odd) .timeline-content {
            margin-left: 55%;
        }

        .timeline-item:nth-child(even) .timeline-content {
            margin-left: 0;
            margin-right: 55%;
        }

        .timeline-dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--gradient-1);
            border-radius: 50%;
            left: 50%;
            top: 20px;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(255,0,110,0.5);
        }

        /* Projects Section */
        .projects {
            min-height: 100vh;
            padding: 10rem 2rem 5rem;
            background: var(--dark-bg);
            position: relative;
        }

        .projects-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 2.5rem;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(50px);
            overflow: hidden;
            position: relative;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-1);
            transform: scaleX(0);
            transition: transform 0.5s ease;
        }

        .project-card:hover::before {
            transform: scaleX(1);
        }

        .project-card:hover {
            transform: translateY(-20px) scale(1.02);
            background: rgba(255,0,110,0.1);
            border-color: var(--primary-color);
            box-shadow: 0 30px 60px rgba(255,0,110,0.3);
        }

        .project-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Contact Section */
        .contact {
            min-height: 100vh;
            padding: 10rem 2rem 5rem;
            background: var(--gradient-2);
            display: flex;
            align-items: center;
        }

        .contact-content {
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }

        .contact-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .contact-link {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 2rem;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-decoration: none;
            color: var(--text-light);
            transition: all 0.5s ease;
            opacity: 0;
            transform: translateY(30px);
        }

        .contact-link:hover {
            background: rgba(255,0,110,0.2);
            border-color: var(--primary-color);
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255,0,110,0.3);
        }

        .contact-icon {
            width: 60px;
            height: 60px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        /* Navbar */
        .navbar {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 1000;
            opacity: 0;
            transform: translateY(-50px);
            transition: all 0.5s ease;
        }

        .nav-toggle {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 1rem;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: none;
            transition: all 0.3s ease;
        }

        .nav-toggle:hover {
            background: var(--gradient-1);
            transform: scale(1.1);
        }

        .nav-menu {
            position: absolute;
            top: 100%;
            right: 0;
            background: rgba(10,10,10,0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            margin-top: 1rem;
            min-width: 250px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .nav-menu.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .nav-link {
            display: block;
            color: var(--text-light);
            text-decoration: none;
            padding: 1rem 0;
            font-weight: 500;
            transition: color 0.3s ease;
            opacity: 0;
            transform: translateX(20px);
        }

        .nav-link:hover {
            color: var(--primary-color);
        }

        /* Scroll Indicators */
        .scroll-indicator {
            position: fixed;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .scroll-line {
            width: 4px;
            height: 200px;
            background: var(--gradient-1);
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .scroll-progress {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 0%;
            background: var(--accent-color);
            transition: height 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .about-content {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
